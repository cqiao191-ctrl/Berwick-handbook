<style>
  html { touch-action: manipulation; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  :root {
    --ink: #1a1a2e;
    --cream: #f5f0e8;
    --gold: #c9a84c;
    --red: #8b2635;
    --mist: #e8edf2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: rgba(201,168,76,0.2); }
  body { background: var(--cream); color: var(--ink); font-family: "Noto Sans SC", sans-serif; line-height: 1.8; -webkit-overflow-scrolling: touch; }

  /* Language Selector */
  .lang-selector { min-height: 100vh; background: var(--ink); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
  .selector-badge { font-size: 11px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 24px; text-align: center; }
  .selector-title { font-family: "Playfair Display", serif; font-size: clamp(28px, 8vw, 48px); color: var(--cream); text-align: center; line-height: 1.2; margin-bottom: 16px; }
  .selector-subtitle { font-size: 13px; letter-spacing: 3px; color: rgba(245,240,232,0.5); text-align: center; margin-bottom: 36px; }
  .lang-buttons { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 300px; }
  .lang-btn { display: flex; align-items: center; justify-content: center; border: 1px solid rgba(201,168,76,0.4); background: transparent; color: var(--gold); padding: 16px 20px; height: 56px; font-size: 16px; letter-spacing: 2px; text-decoration: none; border-radius: 4px; cursor: pointer; width: 100%; transition: border-color 0.2s, background 0.2s; }
  .lang-btn:hover, .lang-btn:active { border-color: var(--gold); background: rgba(201,168,76,0.15); }
  .selector-divider { width: 60px; height: 1px; background: var(--gold); margin: 36px auto; }
  .selector-author { font-size: 12px; color: rgba(245,240,232,0.4); letter-spacing: 2px; text-align: center; }

  /* Cover */
  .cover { min-height: 100vh; background: var(--ink); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
  .cover-badge { font-size: 11px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 24px; }
  .cover-title { font-family: "Playfair Display", serif; font-size: clamp(28px, 8vw, 48px); color: var(--cream); text-align: center; line-height: 1.2; margin-bottom: 16px; }
  .cover-subtitle { font-size: 13px; letter-spacing: 3px; color: rgba(245,240,232,0.5); text-align: center; margin-bottom: 36px; }
  .cover-divider { width: 60px; height: 1px; background: var(--gold); margin: 36px auto; }
  .cover-author { font-size: 12px; color: rgba(245,240,232,0.4); letter-spacing: 2px; text-align: center; line-height: 2; }

  /* TOC */
  .toc { background: var(--ink); padding: 40px 20px; border-top: 1px solid rgba(201,168,76,0.2); }
  .toc-inner { max-width: 800px; margin: 0 auto; }
  .toc-label { font-size: 10px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 24px; }
  .toc-items { display: flex; flex-direction: column; gap: 12px; }
  .toc-item { display: flex; align-items: center; gap: 12px; color: var(--cream); text-decoration: none; padding: 16px; min-height: 60px; border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; cursor: pointer; background: transparent; width: 100%; text-align: left; transition: border-color 0.2s, background 0.2s; }
  .toc-item:hover, .toc-item:active { border-color: var(--gold); background: rgba(201,168,76,0.15); }
  .toc-num { font-family: "Playfair Display", serif; font-size: 24px; color: var(--gold); opacity: 0.6; min-width: 32px; }
  .toc-text { font-size: 15px; line-height: 1.4; }
  .toc-en { font-size: 10px; color: rgba(245,240,232,0.4); letter-spacing: 1px; margin-top: 2px; }

  /* Sections */
  .section { padding: 40px 20px; max-width: 900px; margin: 0 auto; scroll-margin-top: 20px; width: 100%; }
  .section + .section { border-top: 1px solid rgba(26,26,46,0.1); }
  .section-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 36px; }
  .section-num { font-family: "Playfair Display", serif; font-size: clamp(36px, 10vw, 56px); color: var(--gold); opacity: 0.2; line-height: 1; min-width: 40px; }
  .section-titles h2 { font-family: "Playfair Display", serif; font-size: clamp(22px, 6vw, 32px); color: var(--ink); line-height: 1.2; }
  .section-subtitle-text { font-size: 11px; color: rgba(26,26,46,0.4); letter-spacing: 1px; border-bottom: 1px solid rgba(26,26,46,0.15); padding-bottom: 2px; margin-top: 8px; }

  /* Content */
  .content-block { margin-bottom: 24px; }
  .content-block h3 { font-size: 18px; margin-bottom: 12px; color: var(--ink); }
  .content-block h4 { font-size: 16px; margin-bottom: 8px; color: var(--ink); }
  .content-block p { font-size: 15px; line-height: 1.9; margin-bottom: 12px; }
  .content-block ul, .content-block ol { margin-left: 24px; margin-bottom: 12px; }
  .content-block li { font-size: 15px; line-height: 1.8; margin-bottom: 8px; }
  .content-block table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 14px; }
  .content-block table th, .content-block table td { border: 1px solid rgba(26,26,46,0.15); padding: 10px; text-align: left; }
  .content-block table th { background: var(--mist); font-weight: 500; }

  /* Cards */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin: 24px 0; }
  .card { background: var(--mist); padding: 20px; border-left: 3px solid var(--gold); border-radius: 4px; }
  .card-icon { font-size: 28px; margin-bottom: 12px; }
  .card-title { font-size: 15px; font-weight: 500; letter-spacing: 1px; margin-bottom: 8px; color: var(--ink); }
  .card-body { font-size: 14px; color: rgba(26,26,46,0.7); line-height: 1.7; }

  /* Tip Box */
  .tip-box { background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.03)); border: 1px solid rgba(201,168,76,0.3); padding: 20px 16px; margin: 20px 0; position: relative; border-radius: 4px; }
  .tip-box::before { content: '💡'; position: absolute; top: -12px; left: 20px; background: var(--cream); padding: 0 8px; font-size: 16px; }
  .tip-box p { font-size: 15px; color: rgba(26,26,46,0.8); line-height: 1.8; }

  /* Quote */
  .student-quote { border-left: 3px solid var(--red); padding: 16px; margin: 24px 0; background: rgba(139,38,53,0.04); border-radius: 4px; }
  .quote-text { font-size: 15px; font-style: italic; color: var(--ink); line-height: 1.8; }
  .quote-attr { font-size: 11px; color: rgba(26,26,46,0.4); letter-spacing: 2px; margin-top: 8px; }

  /* Divider */
  .section-divider { height: 1px; background: linear-gradient(to right, transparent, rgba(26,26,46,0.1), transparent); margin: 36px 0; }

  /* Footer */
  footer { background: var(--ink); padding: 40px 20px; text-align: center; }
  footer p { color: rgba(245,240,232,0.3); font-size: 12px; letter-spacing: 2px; line-height: 2; }
  footer .gold { color: var(--gold); }
  .switch-lang-btn { display: inline-flex; align-items: center; justify-content: center; margin-top: 24px; border: 1px solid rgba(201,168,76,0.4); background: transparent; color: var(--gold); padding: 14px 20px; height: 50px; font-size: 14px; letter-spacing: 2px; text-decoration: none; border-radius: 4px; min-width: 200px; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
  .switch-lang-btn:hover, .switch-lang-btn:active { border-color: var(--gold); background: rgba(201,168,76,0.15); }

  @media (max-width: 375px) {
    .lang-btn { height: 52px; font-size: 15px; }
    .toc-item { min-height: 56px; padding: 14px; }
    .switch-lang-btn { height: 48px; font-size: 13px; }
    .content-block table { font-size: 12px; }
  }
</style>

// ============================================================
// 🧩 REUSABLE COMPONENTS
// ============================================================
const { useState, useEffect, useRef } = React;

function CardGrid({ items }) {
  return (
    <div className="card-grid">
      {items.map((card, i) => (
        <div key={i} className="card">
          <div className="card-icon">{card.icon}</div>
          <div className="card-title">{card.title}</div>
          <div className="card-body">{card.body}</div>
        </div>
      ))}
    </div>
  );
}

function StudentQuote({ text, attr }) {
  return (
    <div className="student-quote">
      <div className="quote-text">{text}</div>
      <div className="quote-attr">{attr}</div>
    </div>
  );
}

function ContentBlock({ block }) {
  switch (block.type) {
    case "p":
      return <div className="content-block"><p dangerouslySetInnerHTML={{ __html: block.content }} /></div>;
    case "h3":
      return <div className="content-block"><h3 dangerouslySetInnerHTML={{ __html: block.content }} /></div>;
    case "h4":
      return <div className="content-block"><h4 dangerouslySetInnerHTML={{ __html: block.content }} /></div>;
    case "ul":
      return (
        <div className="content-block">
          <ul>{block.items.map((item, i) => <li key={i} dangerouslySetInnerHTML={{ __html: item }} />)}</ul>
        </div>
      );
    case "ol":
      return (
        <div className="content-block">
          <ol>{block.items.map((item, i) => <li key={i} dangerouslySetInnerHTML={{ __html: item }} />)}</ol>
        </div>
      );
    case "cards":
      return <div className="content-block"><CardGrid items={block.items} /></div>;
    case "quote":
      return <StudentQuote text={block.text} attr={block.attr} />;
    case "divider":
      return <div className="section-divider" />;
    default:
      return null;
  }
}

function Section({ section }) {
  return (
    <div id={section.id} className="section">
      <div className="section-header">
        <div className="section-num">{section.num}</div>
        <div className="section-titles">
          <h2>{section.title}</h2>
          <div className="section-subtitle-text">{section.subtitle}</div>
        </div>
      </div>
      {section.blocks.map((block, i) => <ContentBlock key={i} block={block} />)}
    </div>
  );
}

// ============================================================
// 📱 MAIN APP
// ============================================================
function App() {
  const [activeLang, setActiveLang] = useState(null);
  const topRef = useRef(null);

  const languages = [
    { code: "zh", flag: "🇨🇳", label: "中文" },
    { code: "en", flag: "🇺🇸", label: "English" },
    { code: "ja", flag: "🇯🇵", label: "日本語" },
    { code: "ko", flag: "🇰🇷", label: "한국어" }
  ];

  const selectLang = (code) => {
    setActiveLang(code);
    // Update html lang attribute for accessibility
    document.documentElement.lang = code;
    // Update font
    document.body.style.fontFamily = TRANSLATIONS[code].meta.font;
    window.scrollTo(0, 0);
  };

  const backToSelector = () => {
    setActiveLang(null);
    document.documentElement.lang = "zh";
    document.body.style.fontFamily = '"Noto Sans SC", sans-serif';
    window.scrollTo(0, 0);
  };

  const scrollToSection = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: "smooth" });
  };

  // Language Selector
  if (!activeLang) {
    return (
      <div className="lang-selector" ref={topRef}>
        <div className="selector-badge">🏫 Berwick Academy · South Berwick, Maine</div>
        <h1 className="selector-title">📚 International Student<br />Handbook</h1>
        <p className="selector-subtitle">请选择您的语言 / Please select your language</p>
        <div className="lang-buttons">
          {languages.map(l => (
            <button key={l.code} className="lang-btn" onClick={() => selectLang(l.code)}>
              {l.flag} {l.label}
            </button>
          ))}
        </div>
        <div className="selector-divider"></div>
        <p className="selector-author">✍️ Official Info from Berwick Academy | Written by Current Boarding Students</p>
      </div>
    );
  }

  const data = TRANSLATIONS[activeLang];

  return (
    <div>
      {/* Cover */}
      <div className="cover">
        <div className="cover-badge">{data.cover.badge}</div>
        <h1 className="cover-title">{data.cover.title}</h1>
        <p className="cover-subtitle">{data.cover.subtitle}</p>
        <div className="cover-divider"></div>
        <p className="cover-author" style={{ whiteSpace: "pre-line" }}>{data.cover.author}</p>
      </div>

      {/* Table of Contents */}
      <div className="toc">
        <div className="toc-inner">
          <div className="toc-label">{data.toc.label}</div>
          <div className="toc-items">
            {data.sections.map(s => (
              <button key={s.id} className="toc-item" onClick={() => scrollToSection(s.id)}>
                <span className="toc-num">{s.num}</span>
                <div>
                  <div className="toc-text">{s.title}</div>
                  <div className="toc-en">{s.subtitle}</div>
                </div>
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Sections */}
      {data.sections.map(s => <Section key={s.id} section={s} />)}

      {/* Footer */}
      <footer>
        <p className="gold">{data.footer.title}</p>
        {data.footer.lines.map((line, i) => <p key={i}>{line}</p>)}
        <button className="switch-lang-btn" onClick={backToSelector}>{data.switchLang}</button>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App />);
</script>
